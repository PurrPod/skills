<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{COURSE_NAME}} - {{CHAPTER_NAME}}</title>
    
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #334155; --text-muted: #64748b; 
            --primary: #4f46e5; --primary-hover: #4338ca; --success: #10b981; --danger: #ef4444; 
            --border: #e2e8f0; --hover: #f1f5f9; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); }
        
        /* 定制滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 顶部毛玻璃控制栏 */
        .toolbar { padding: 15px 25px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 10; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .tool-title { font-size: 15pt; font-weight: bold; color: var(--text); display: flex; align-items: center; gap: 12px; }
        .home-btn { text-decoration: none; background: var(--hover); padding: 6px 14px; border-radius: 8px; font-size: 11pt; transition: 0.2s; border: 1px solid var(--border); }
        .home-btn:hover { background: #e2e8f0; transform: translateY(-1px); }
        
        .view-controls { display: flex; gap: 8px; }
        .view-btn { padding: 8px 16px; border: 1px solid var(--primary); background: transparent; color: var(--primary); border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 9.5pt; transition: all 0.2s; }
        .view-btn:hover { background: #e0e7ff; }
        .view-btn.active { background: var(--primary); color: white; box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3); }
        
        /* 主体布局 */
        .workspace { display: flex; flex: 1; overflow: hidden; transition: all 0.3s ease; }
        .panel { height: 100%; overflow-y: auto; transition: all 0.3s ease; scroll-behavior: smooth; }
        
        /* 知识点面板 */
        .notes-panel { background: var(--card); border-right: 1px solid var(--border); padding: 40px; box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        .notes-content { max-width: 700px; margin: 0 auto; line-height: 1.8; font-size: 11pt; color: #1e293b; }
        .notes-content h1 { font-size: 20pt; margin-bottom: 30px; color: var(--primary); border-bottom: 2px solid #e0e7ff; padding-bottom: 10px; }
        .notes-content h2 { margin-top: 30px; margin-bottom: 15px; font-size: 14pt; color: #334155; }
        .notes-content ul { padding-left: 20px; margin-bottom: 15px; }
        .notes-content li { margin-bottom: 6px; }
        .notes-content table { border-collapse: collapse; width: 100%; margin: 20px 0; border-radius: 8px; overflow: hidden; box-shadow: 0 0 0 1px var(--border); }
        .notes-content th { background: var(--hover); text-align: left; padding: 10px 15px; font-weight: 600; }
        .notes-content td { border-top: 1px solid var(--border); padding: 10px 15px; }
        .notes-content blockquote { margin: 20px 0; padding: 15px 20px; border-left: 4px solid var(--primary); background: #e0e7ff; color: #3730a3; border-radius: 0 8px 8px 0; }
        .notes-content code { background: var(--hover); padding: 3px 6px; border-radius: 6px; color: #ea580c; font-family: monospace; font-size: 0.9em; }
        
        /* 题库面板 */
        .quiz-panel { background: var(--bg); padding: 40px; position: relative; }
        .quiz-content { max-width: 750px; margin: 0 auto; padding-bottom: 80px;}
        
        /* 视图状态机 */
        .view-split .notes-panel, .view-split .quiz-panel { width: 50%; display: block; }
        .view-notes-only .notes-panel { width: 100%; display: block; } .view-notes-only .quiz-panel { width: 0; display: none; }
        .view-quiz-only .notes-panel { width: 0; display: none; } .view-quiz-only .quiz-panel { width: 100%; display: block; }

        /* 题目样式 */
        .category-title { margin: 30px 0 20px; padding-left: 12px; border-left: 5px solid var(--primary); font-size: 15pt; font-weight: bold; color: #1e293b; }
        .q-card { border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 25px; background: var(--card); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); transition: all 0.3s; }
        .q-text { font-weight: 600; margin-bottom: 20px; font-size: 11.5pt; display: flex; align-items: flex-start; gap: 10px; line-height: 1.6; color: #0f172a;}
        
        .opt-list { list-style: none; }
        .opt-item { display: block; padding: 14px 18px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; background: var(--card); }
        .opt-item:hover { background: var(--hover); border-color: #cbd5e1; }
        .opt-item.selected { border-color: var(--primary); background: #eef2ff; font-weight: 600; color: var(--primary); box-shadow: inset 0 0 0 1px var(--primary); }
        .opt-item.correct { border-color: var(--success); background: #ecfdf5; color: #065f46; font-weight: 600; box-shadow: inset 0 0 0 1px var(--success); }
        .opt-item.wrong { border-color: var(--danger); background: #fef2f2; color: #991b1b; text-decoration: line-through; box-shadow: inset 0 0 0 1px var(--danger); }
        
        .badge { font-size: 9pt; font-weight: 600; padding: 4px 10px; border-radius: 20px; display: inline-block; white-space: nowrap; margin-top: 2px;}
        .badge.missed { color: var(--danger); background: #fee2e2; }
        .badge.wrong { color: var(--danger); background: #fee2e2; }
        .badge.correct { color: var(--success); background: #d1fae5; }
        .badge.qa { color: var(--primary); background: #e0e7ff; }

        .input-ans { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; font-size: 11pt; font-family: inherit; transition: all 0.2s; background: var(--hover); color: var(--text); resize: vertical; }
        .input-ans:focus { border-color: var(--primary); outline: none; background: var(--card); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        
        /* 独立折叠按钮与解析框 */
        .toggle-ana-btn { background: var(--hover); color: var(--text-muted); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 9.5pt; margin-bottom: 12px; font-weight: 600; transition: 0.2s;}
        .toggle-ana-btn:hover { background: #e2e8f0; color: var(--text); }
        .analysis { padding: 20px; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; display: none; font-size: 10.5pt; color: #334155; line-height: 1.7; box-shadow: inner 0 2px 4px rgba(0,0,0,0.02);}
        .analysis.show { display: block; }
        
        /* 悬浮分数板 */
        .score-board { position: sticky; top: 0; float: right; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); padding: 15px 25px; border-radius: 16px; border: 1px solid rgba(226,232,240,0.8); text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); z-index: 5; margin-bottom: 20px; }
        
        /* 全局交卷按钮 */
        .global-submit-wrap { text-align: center; margin-top: 50px; padding-top: 30px; border-top: 2px dashed #cbd5e1; }
        .global-submit-btn { background: var(--primary); color: white; font-size: 13pt; padding: 16px 60px; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(79,70,229,0.4); transition: all 0.3s; font-weight: bold; letter-spacing: 1px;}
        .global-submit-btn:hover { background: var(--primary-hover); transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(79,70,229,0.5); }
        .global-submit-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="tool-title">
        <a href="../index.html" class="home-btn">🏠 返回目录</a>
        {{COURSE_NAME}} <span style="color: var(--text-muted); font-size: 12pt; font-weight: normal; margin-left: 5px;">/ {{CHAPTER_NAME}}</span>
    </div>
    <div class="view-controls">
        <button class="view-btn active" onclick="switchView('view-split', this)">分屏学习</button>
        <button class="view-btn" onclick="switchView('view-quiz-only', this)">沉浸刷题</button>
        <button class="view-btn" onclick="switchView('view-notes-only', this)">背诵笔记</button>
    </div>
</div>

<div class="workspace view-split" id="workspace">
    <div class="panel notes-panel">
        <div class="notes-content" id="notes-content"></div>
    </div>
    
    <div class="panel quiz-panel" id="quiz-panel-scroll">
        <div class="quiz-content">
            <div class="score-board">
                <div style="font-size: 9pt; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;" id="score-label">客观题得分</div>
                <div id="score" style="font-size: 22pt; font-weight: 800; color: var(--text); margin: 5px 0;"> - </div>
                <div id="progress" style="font-size: 9pt; color: var(--text-muted); font-weight: 500;">进度: 0/0</div>
            </div>
            
            <div id="quiz-container"></div>
            
            <div class="global-submit-wrap">
                <button class="global-submit-btn" id="global-submit-btn" onclick="submitQuiz()">交卷并核对答案</button>
            </div>
        </div>
    </div>
</div>

<script type="text/plain" id="raw-notes-data">{{NOTES_MARKDOWN}}</script>

<script>
const quizData = {{QUESTIONS_JSON}};
let userAnswers = {};
let isSubmitted = false;

function switchView(viewName, btn) {
    document.getElementById('workspace').className = `workspace ${viewName}`;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function init() {
    var rawNotes = document.getElementById('raw-notes-data').textContent;
    // 保护LaTeX: 把$$..$$和$..$内部可能被marked.js误解析的字符做HTML转义
    // [→&#91; ]→&#93; 防止被当Markdown链接; <→&lt; >→&gt; 防止被当HTML标签; \→&#92; 防止转义
    var protectedNotes = rawNotes;
    var pieces = [];
    // 先处理块级公式 $$...$$ (重要: 不能多吞字符)
    protectedNotes = protectedNotes.replace(/\$\$[\s\S]*?\$\$/g, function(m) {
        m = m.replace(/\[/g, '&#91;').replace(/\]/g, '&#93;');
        m = m.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        m = m.replace(/\\\\/g, '&#92;&#92;');
        var idx = pieces.length;
        pieces.push(m);
        return '@@MATH_' + idx + '---';
    });
    // 再处理行内公式 $...$
    protectedNotes = protectedNotes.replace(/\$[^\$]*?\$/g, function(m) {
        m = m.replace(/\[/g, '&#91;').replace(/\]/g, '&#93;');
        m = m.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        m = m.replace(/\\\\/g, '&#92;&#92;');
        var idx = pieces.length;
        pieces.push(m);
        return '@@MATH_' + idx + '---';
    });
    // marked.js渲染 (LaTeX特殊符号已被保护)
    var rendered = marked.parse(protectedNotes);
    // 恢复原始LaTeX (HTML实体会被浏览器正确还原)
    for (var i = 0; i < pieces.length; i++) {
        // $$转义: 防止$&$'等特殊替换模式
        rendered = rendered.replace('@@MATH_' + i + '---', pieces[i].replace(/\$/g, '$$$$'));
    }
    document.getElementById('notes-content').innerHTML = rendered;
    // 触发MathJax渲染知识点中的公式
    function renderMath() {
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(function() {
                setTimeout(renderMath, 800);
            });
        } else {
            setTimeout(renderMath, 400);
        }
    }
    setTimeout(renderMath, 200);

    const container = document.getElementById('quiz-container');
    document.getElementById('progress').innerText = '\u5df2\u7b54: 0/' + quizData.length;

    var currCat = '';
    var htmlContent = '';

    quizData.forEach(function(q, i) {
        if (q.category !== currCat) {
            currCat = q.category;
            htmlContent += '<h2 class="category-title">' + currCat + '</h2>';
        }
        var cardHtml = '<div class="q-card" id="q-' + i + '"><div class="q-text"><span>' + (i+1) + '. ' + q.question + '</span><span id="badge-container-' + i + '"></span></div>';
        if (q.type === 'choice' || q.type === 'judgement') {
            cardHtml += '<ul class="opt-list">';
            q.options.forEach(function(opt, oi) {
                var txt = opt.text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                cardHtml += '<li class="opt-item" onclick="selectChoice(' + i + ', this, \'' + txt + '\')">' + opt.text + '</li>';
            });
            cardHtml += '</ul>';
        } else if (q.type === 'blank') {
            cardHtml += '<input type="text" class="input-ans" id="in-' + i + '" oninput="saveInput(' + i + ', this.value)" placeholder="\u8f93\u5165\u7b54\u6848">';
        } else if (q.type === 'qa') {
            cardHtml += '<textarea class="input-ans" id="in-' + i + '" rows="4" oninput="saveInput(' + i + ', this.value)" placeholder="\u3010\u4e3b\u89c2\u9898\u3011\u8bf7\u5728\u6b64\u63a8\u5bfc\u8349\u7a3f"></textarea>';
        }
        var ans = q.answer ? '<strong>\u53c2\u8003\u7b54\u6848\uff1a</strong><span style="color:var(--primary);font-weight:600;">' + q.answer + '</span><br><br>' : '';
        cardHtml += '<button class="toggle-ana-btn" id="toggle-btn-' + i + '" style="display:none" onclick="toggleAnalysis(' + i + ')">\u6536\u8d77\u89e3\u6790</button><div class="analysis" id="ana-' + i + '">' + ans + '<strong>\u8be6\u7ec6\u89e3\u6790\uff1a</strong><br>' + q.analysis + '</div></div>';
        htmlContent += cardHtml;
    });
    container.innerHTML = htmlContent;
    setTimeout(renderMath, 200);
}
function selectChoice(i, el, optText) {
    if (isSubmitted) return; 
    userAnswers[i] = optText;
    const items = document.getElementById(`q-${i}`).querySelectorAll('.opt-item');
    items.forEach(item => item.classList.remove('selected'));
    el.classList.add('selected');
    updateProgress();
}

function saveInput(i, val) {
    if (isSubmitted) return;
    userAnswers[i] = val.trim();
    updateProgress();
}

function updateProgress() {
    let answeredCount = Object.keys(userAnswers).filter(k => userAnswers[k] !== "").length;
    document.getElementById('progress').innerText = `已答: ${answeredCount}/${quizData.length}`;
}

function submitQuiz() {
    if (isSubmitted) return;
    
    let answeredCount = Object.keys(userAnswers).filter(k => userAnswers[k] !== "").length;
    if (answeredCount < quizData.length) {
        if (!confirm(`您还有 ${quizData.length - answeredCount} 道题未作答，确定要提前交卷吗？\n(未作答将全部记为错误)`)) return;
    }
    
    isSubmitted = true;
    let score = 0;
    let scorableCount = 0;
    
    quizData.forEach((q, i) => {
        let isCorrect = false;
        let isAnswered = false;
        let qCard = document.getElementById(`q-${i}`);
        let badgeContainer = document.getElementById(`badge-container-${i}`);
        
        if (q.type === 'choice' || q.type === 'judgement') {
            scorableCount++;
            let userAns = userAnswers[i] || "";
            isAnswered = userAns !== "";
            isCorrect = isAnswered && (userAns === q.answer || userAns.startsWith(q.answer + '.') || userAns.includes(q.answer));
            
            if (isCorrect) score++;
            
            const items = qCard.querySelectorAll('.opt-item');
            items.forEach((item) => {
                item.style.cursor = 'default';
                let itemText = item.innerText;
                let isThisCorrect = itemText === q.answer || itemText.startsWith(q.answer + '.') || (q.type==='judgement' && itemText===q.answer);
                
                if (isThisCorrect) {
                    item.classList.add('correct');
                } else if (item.classList.contains('selected') && !isThisCorrect) {
                    item.classList.add('wrong');
                }
            });
            
        } else if (q.type === 'blank') {
            scorableCount++;
            let inputElem = document.getElementById(`in-${i}`);
            let userAns = userAnswers[i] || "";
            let cleanInput = userAns.toLowerCase().replace(/\s+/g, '');
            let cleanAnswer = q.answer.toLowerCase().replace(/\s+/g, '');
            
            isAnswered = cleanInput !== "";
            isCorrect = isAnswered && (cleanInput === cleanAnswer);
            
            if (isCorrect) score++;
            inputElem.style.borderColor = isCorrect ? 'var(--success)' : 'var(--danger)';
            inputElem.style.backgroundColor = isCorrect ? '#ecfdf5' : '#fef2f2';
            inputElem.disabled = true;
            
        } else if (q.type === 'qa') {
            document.getElementById(`in-${i}`).disabled = true;
        }
        
        if (q.type === 'choice' || q.type === 'judgement' || q.type === 'blank') {
            if (!isAnswered) {
                qCard.style.borderColor = 'var(--danger)';
                badgeContainer.innerHTML = `<span class="badge missed">未作答</span>`;
            } else if (!isCorrect) {
                qCard.style.borderColor = 'var(--danger)';
                badgeContainer.innerHTML = `<span class="badge wrong">错误</span>`;
            } else {
                qCard.style.borderColor = 'var(--success)';
                badgeContainer.innerHTML = `<span class="badge correct">正确</span>`;
            }
        } else if (q.type === 'qa') {
            qCard.style.borderColor = 'var(--border)';
            badgeContainer.innerHTML = `<span class="badge qa">主观题自测</span>`;
        }
        
        document.getElementById(`toggle-btn-${i}`).style.display = 'inline-block';
        document.getElementById(`toggle-btn-${i}`).innerText = '收起解析';
        document.getElementById(`ana-${i}`).classList.add('show');
    });
    
    const scoreElem = document.getElementById('score');
    scoreElem.innerText = `${score} / ${scorableCount}`;
    scoreElem.style.color = (score / scorableCount) >= 0.6 ? 'var(--success)' : 'var(--danger)';
    
    const btn = document.getElementById('global-submit-btn');
    btn.innerText = "已完成交卷";
    btn.disabled = true;
    
    document.getElementById('quiz-panel-scroll').scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleAnalysis(i) {
    const ana = document.getElementById(`ana-${i}`);
    const btn = document.getElementById(`toggle-btn-${i}`);
    if (ana.classList.contains('show')) {
        ana.classList.remove('show');
        btn.innerText = "展开解析";
    } else {
        ana.classList.add('show');
        btn.innerText = "收起解析";
    }
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
